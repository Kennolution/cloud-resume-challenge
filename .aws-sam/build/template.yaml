AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Cloud Resume Challenge Backend
Resources:
  VisitorTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cloud-resume-stats
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
      BillingMode: PAY_PER_REQUEST
  VisitorCounterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: VisitorCounterFunction
      Handler: visitorCounter.handler
      Runtime: nodejs18.x
      Architectures:
      - x86_64
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: VisitorTable
      Events:
        Visits:
          Type: Api
          Properties:
            Path: /visit
            Method: get
            RestApiId:
              Ref: MyApi
    Metadata:
      SamResourceId: VisitorCounterFunction
  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: '''GET,OPTIONS'''
        AllowHeaders: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'''
        AllowOrigin: '''*'''
Outputs:
  VisitApi:
    Description: New API Gateway endpoint URL
    Value:
      Fn::Sub: https://${MyApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/visit
